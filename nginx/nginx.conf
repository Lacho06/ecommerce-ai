events {}

http {
  server {
    listen 80;

    location /api/ {
      proxy_pass http://backend:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai/ {
      proxy_pass http://ai-service:8000/;
    }

    location /whatsapp/ {
      proxy_pass http://whatsapp-service:4000/;
    }

    location /minio/ {
      proxy_pass http://minio:9000/;
    }
  }
}